<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ember Trove</title>
    <link data-trunk rel="icon" type="image/svg+xml" href="public/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <link data-trunk rel="tailwind-css" href="input.css" />
    <!-- Loading screen styles — must use inline CSS because Trunk's Tailwind
         stylesheet is not yet available while the WASM bundle is downloading.
         Prefixed with "etl-" to avoid colliding with any app styles. -->
    <style>
      .etl-root {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 18px;
        background: #fafaf9; /* stone-50 */
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
      }
      .etl-wordmark { display: flex; align-items: center; gap: 10px; }
      .etl-title {
        font-size: 20px; font-weight: 600;
        color: #1c1917; /* stone-900 */ letter-spacing: -0.01em;
      }
      .etl-spinner {
        width: 28px; height: 28px; border-radius: 50%;
        border: 3px solid #e7e5e4; /* stone-200 */
        border-top-color: #f59e0b; /* amber-400 */
        animation: etl-spin 0.75s linear infinite;
      }
      .etl-hint { font-size: 12px; color: #a8a29e; /* stone-400 */ }
      @keyframes etl-spin { to { transform: rotate(360deg); } }
      @media (prefers-color-scheme: dark) {
        .etl-root    { background: #0c0a09; } /* stone-950 */
        .etl-title   { color: #f5f5f4; }     /* stone-100 */
        .etl-spinner { border-color: #292524; border-top-color: #f59e0b; }
        .etl-hint    { color: #57534e; }     /* stone-600 */
      }
    </style>
    <script>
      // Workaround: WebAssembly.instantiateStreaming hangs on this server
      // configuration (nginx reverse-proxy + preload hints). Force the
      // arrayBuffer fallback path which uses WebAssembly.instantiate(bytes)
      // and reliably completes in ~30 ms.
      WebAssembly.instantiateStreaming = async (source, imports) => {
        const resp = source instanceof Promise ? await source : source;
        const bytes = await resp.arrayBuffer();
        return WebAssembly.instantiate(bytes, imports);
      };
    </script>
  </head>
  <body class="bg-stone-50 text-stone-900 min-h-screen dark:bg-stone-950 dark:text-stone-100">
    <!-- Static loading screen shown while the WASM bundle is downloading and
         instantiating. Removed from main.rs once mount_to_body() returns. -->
    <div id="app-loader" class="etl-root">
      <div class="etl-wordmark">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="36" height="36" aria-hidden="true">
          <circle cx="16" cy="18" r="13" fill="#7c2d12" opacity="0.25"/>
          <path d="M16 2 C16 2 8 10 8 18 C8 23.5 11.5 28 16 28 C20.5 28 24 23.5 24 18 C24 10 16 2 16 2 Z" fill="#ea580c"/>
          <path d="M16 8 C16 8 11 14 11 19 C11 22 13.2 25 16 25 C18.8 25 21 22 21 19 C21 14 16 8 16 8 Z" fill="#fb923c"/>
          <path d="M16 14 C16 14 13 17.5 13 20 C13 21.7 14.3 23 16 23 C17.7 23 19 21.7 19 20 C19 17.5 16 14 16 14 Z" fill="#fbbf24"/>
          <ellipse cx="16" cy="19.5" rx="2" ry="2.5" fill="#fef3c7" opacity="0.8"/>
        </svg>
        <span class="etl-title">Ember Trove</span>
      </div>
      <div class="etl-spinner"></div>
      <span class="etl-hint">Loading…</span>
    </div>
  </body>
</html>
