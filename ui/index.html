<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ember Trove</title>
    <link data-trunk rel="icon" type="image/svg+xml" href="public/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <link data-trunk rel="tailwind-css" href="input.css" />
    <script>
      // Workaround: WebAssembly.instantiateStreaming hangs on this server
      // configuration (nginx reverse-proxy + preload hints). Force the
      // arrayBuffer fallback path which uses WebAssembly.instantiate(bytes)
      // and reliably completes in ~30 ms.
      WebAssembly.instantiateStreaming = async (source, imports) => {
        const resp = source instanceof Promise ? await source : source;
        const bytes = await resp.arrayBuffer();
        return WebAssembly.instantiate(bytes, imports);
      };
    </script>
  </head>
  <body class="bg-stone-50 text-stone-900 min-h-screen dark:bg-stone-950 dark:text-stone-100"></body>
</html>
