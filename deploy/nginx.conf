server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Allow uploads up to 50 MB — matches the API's DefaultBodyLimit.
    client_max_body_size 50m;

    # Proxy API requests to the backend
    location /api/ {
        proxy_pass http://api:3003/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Auth callback sets large Set-Cookie headers (JWT tokens).
        # Default nginx buffer (4KB) is too small — increases to 32KB to prevent
        # "upstream sent too big header" 502 errors.
        proxy_buffer_size          32k;
        proxy_buffers              4 32k;
        proxy_busy_buffers_size    32k;
    }

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' blob: data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # SPA fallback: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service worker must not be cached — browser must re-validate on each load
    # so updated versions propagate immediately.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    # Cache static assets aggressively
    location ~* \.(wasm|js|css|svg|ico|png|jpg|webp|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip            on;
    gzip_types      text/plain text/css application/javascript application/wasm;
    gzip_min_length 1024;
}
