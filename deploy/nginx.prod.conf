# ── Rate-limiting zones ────────────────────────────────────────────────────────
# Auth endpoints: 10 requests/minute per IP (login, callback, refresh, logout).
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
# General API: 120 requests/minute per IP.
limit_req_zone $binary_remote_addr zone=api:10m  rate=120r/m;

# HTTP — redirect to HTTPS, except for ACME certificate renewal challenges
server {
    listen 80;
    server_name trove.chultarsky.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — TLS termination + reverse proxy
server {
    listen 443 ssl;
    server_name trove.chultarsky.me;

    ssl_certificate     /etc/letsencrypt/live/trove.chultarsky.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trove.chultarsky.me/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    # CSP: wasm-bindgen JS glue requires both 'wasm-unsafe-eval' and 'unsafe-eval'.
    # 'unsafe-inline' is required for Trunk's inline <script type="module"> bootstrap
    # and for the WebAssembly.instantiateStreaming workaround script in index.html.
    # Google Fonts: googleapis.com (style) + gstatic.com (font files).
    # Cognito hosted-UI domain is added to connect-src for the token endpoint.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://trove-chultarsky.auth.us-east-2.amazoncognito.com https://cognito-idp.us-east-2.amazonaws.com; frame-ancestors 'none';" always;

    # ── Swagger UI — internal access only ────────────────────────────────────
    # API docs are not needed from the public internet.
    location ~ ^/(swagger-ui|api-docs) {
        allow 127.0.0.1;
        deny all;
    }

    # ── Auth endpoints — strict rate limit ───────────────────────────────────
    location ~ ^/api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;

        proxy_pass              http://api:3003;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_buffering         off;
        # JWT cookies in auth callback Set-Cookie headers exceed the default 4k
        # header buffer — raise it to accommodate large token payloads.
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ── API backend — general rate limit + generous timeout for streaming ─────
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        limit_req_status 429;

        proxy_pass              http://api:3003/api/;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_buffering         off;
        proxy_read_timeout      300s;
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
    }

    # ── Frontend — proxy to the UI container (nginx serving WASM + assets) ───
    location / {
        proxy_pass       http://ui:80/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
