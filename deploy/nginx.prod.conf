# HTTP — redirect to HTTPS, except for ACME certificate renewal challenges
server {
    listen 80;
    server_name trove.chultarsky.me;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — TLS termination + reverse proxy
server {
    listen 443 ssl;
    server_name trove.chultarsky.me;

    ssl_certificate     /etc/letsencrypt/live/trove.chultarsky.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trove.chultarsky.me/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    # API backend — proxy with generous timeout for streaming downloads
    location /api/ {
        proxy_pass              http://api:3003/api/;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_buffering         off;
        proxy_read_timeout      300s;
        # JWT cookies in auth callback Set-Cookie headers exceed the default 4k
        # header buffer — raise it to accommodate large token payloads.
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Frontend — proxy to the UI container (nginx serving WASM + static assets)
    location / {
        proxy_pass       http://ui:80/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
