apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ember-trove
  namespace: ember-trove
  annotations:
    # Allow large file uploads (attachments)
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    # No rewrite — the API already mounts its router at /api, so the full
    # path must be forwarded as-is (e.g. /api/nodes → /api/nodes).
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ember-trove.example.com
      secretName: ember-trove-tls
  rules:
    - host: ember-trove.example.com
      http:
        paths:
          # API traffic: /api/* forwarded unchanged to the API service
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: ember-trove-api
                port:
                  number: 3003
          # All other traffic → UI nginx (serves index.html SPA fallback)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ember-trove-ui
                port:
                  number: 8003
