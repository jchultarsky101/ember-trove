# NOTE: Replace ALL base64-encoded values before applying to a real cluster.
# Generate: echo -n 'your-value' | base64
#
# Required values:
#   DATABASE_URL  — full postgres connection string
#   DB_PASSWORD   — used by the postgres StatefulSet (must match DATABASE_URL password)
#   S3_ACCESS_KEY — MinIO / AWS access key
#   S3_SECRET_KEY — MinIO / AWS secret key
#   OIDC_CLIENT_SECRET — Keycloak client secret
#   COOKIE_KEY    — exactly 128 hex chars (64 bytes); generate with:
#                   openssl rand -hex 64
apiVersion: v1
kind: Secret
metadata:
  name: ember-trove-secrets
  namespace: ember-trove
type: Opaque
data:
  # postgres://ember_trove:secret@postgres/ember_trove  (placeholder)
  DATABASE_URL:       cG9zdGdyZXMvL2VtYmVyX3Ryb3ZlOnNlY3JldEBwb3N0Z3Jlcy9lbWJlcl90cm92ZQ==
  # "secret"  (placeholder — must match DATABASE_URL password)
  DB_PASSWORD:        c2VjcmV0
  # "ember_trove"  (placeholder)
  S3_ACCESS_KEY:      ZW1iZXJfdHJvdmU=
  # "change-me"  (placeholder)
  S3_SECRET_KEY:      Y2hhbmdlLW1l
  # "change-me"  (placeholder)
  OIDC_CLIENT_SECRET: Y2hhbmdlLW1l
  # 128 zero hex chars encoded as base64  (placeholder — REPLACE with real key)
  # Real value: openssl rand -hex 64 | tr -d '\n' | base64
  COOKIE_KEY:         MDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDAwMDA=
