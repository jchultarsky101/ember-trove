name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: check (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check (api + common)
        run: cargo check --workspace --exclude ui

      - name: cargo clippy (api + common)
        run: cargo clippy --workspace --exclude ui -- -D warnings

      - name: cargo test (api + common)
        run: cargo test --workspace --exclude ui

  check-wasm:
    name: check (wasm32-unknown-unknown)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (pinned via rust-toolchain.toml) + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-wasm-

      - name: cargo check (ui, wasm32)
        run: cargo check -p ui --target wasm32-unknown-unknown

      - name: cargo clippy (ui, wasm32)
        run: cargo clippy -p ui --target wasm32-unknown-unknown -- -D warnings

  audit:
    name: cargo audit (security)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ubuntu-cargo-audit-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-audit-

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

  migrations:
    name: validate migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ember_trove
          POSTGRES_PASSWORD: ember_trove_dev
          POSTGRES_DB: ember_trove
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ubuntu-cargo-sqlx-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-sqlx-

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked

      - name: Run migrations
        env:
          DATABASE_URL: postgres://ember_trove:ember_trove_dev@localhost:5432/ember_trove
        run: sqlx migrate run --source migrations

  docker-build:
    name: docker build validation
    runs-on: ubuntu-latest
    # Only run on ubuntu — Docker build is slow; skip on macos runner.
    # Builds both images to catch Dockerfile errors before a release deploy.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.api
          push: false
          tags: ember-trove/api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ui image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.ui
          push: false
          tags: ember-trove/ui:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
