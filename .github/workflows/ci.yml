name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: check (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo check (api + common)
        run: cargo check --workspace --exclude ui

      - name: cargo clippy (api + common)
        run: cargo clippy --workspace --exclude ui -- -D warnings

      - name: cargo test (api + common)
        run: cargo test --workspace --exclude ui

  check-wasm:
    name: check (wasm32-unknown-unknown)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-wasm-

      - name: cargo check (ui, wasm32)
        run: cargo check -p ui --target wasm32-unknown-unknown

      - name: cargo clippy (ui, wasm32)
        run: cargo clippy -p ui --target wasm32-unknown-unknown -- -D warnings
