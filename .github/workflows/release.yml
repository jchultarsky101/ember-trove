name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write
  packages: write   # push images to GHCR

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/ember-trove-api
  UI_IMAGE:  ghcr.io/${{ github.repository_owner }}/ember-trove-ui

jobs:
  # ── 1. Create the GitHub Release ───────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          echo "$NOTES" > /tmp/release-notes.txt
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "v${{ steps.notes.outputs.version }}" \
            --notes-file /tmp/release-notes.txt

  # ── 2. Build Docker images on GitHub runners and push to GHCR ──────────────
  build:
    name: Build & push images
    runs-on: ubuntu-latest
    needs: release

    steps:
      - uses: actions/checkout@v4

      - name: Patch api/Cargo.toml version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" api/Cargo.toml
          echo "api/Cargo.toml → ${VERSION}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.api
          push: true
          tags: ${{ env.API_IMAGE }}:${{ github.ref_name }}
          cache-from: type=gha,scope=api
          cache-to:   type=gha,mode=max,scope=api

      - name: Build & push UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.ui
          push: true
          tags: ${{ env.UI_IMAGE }}:${{ github.ref_name }}
          cache-from: type=gha,scope=ui
          cache-to:   type=gha,mode=max,scope=ui

  # ── 3. Pull pre-built images on EC2 and restart services ───────────────────
  deploy:
    name: Deploy to production (Lightsail)
    runs-on: ubuntu-latest
    needs: build
    if: vars.DEPLOY_ENABLED == 'true'

    # Serialise deploys on the EC2 instance — only one at a time regardless of tag.
    concurrency:
      group: production-ec2-deploy
      cancel-in-progress: false

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          # Pull + restart is fast; 10 min is generous.
          command_timeout: 10m
          envs: GITHUB_REF_NAME,GITHUB_ACTOR,GITHUB_TOKEN
          script: |
            set -euo pipefail

            TAG="${GITHUB_REF_NAME}"
            API_IMAGE="ghcr.io/${{ github.repository_owner }}/ember-trove-api"
            UI_IMAGE="ghcr.io/${{ github.repository_owner }}/ember-trove-ui"

            echo "=== Logging in to GHCR ==="
            echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin

            echo "=== Fetching latest compose config ==="
            cd ~/ember-trove
            git fetch origin main
            git checkout main
            git pull origin main

            echo "=== Pulling pre-built images for ${TAG} ==="
            docker pull "${API_IMAGE}:${TAG}"
            docker pull "${UI_IMAGE}:${TAG}"

            echo "=== Restarting services ==="
            IMAGE_TAG="${TAG}" \
              docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod \
              up -d --force-recreate api ui proxy

            echo "=== Verifying health (up to 60s) ==="
            for i in $(seq 1 12); do
              sleep 5
              HEALTH=$(docker exec deploy-api-1 wget -qO- http://localhost:3003/api/health 2>/dev/null || true)
              if echo "$HEALTH" | python3 -c "
            import sys, json
            d = json.load(sys.stdin)
            assert d['status'] == 'ok'
            print('Health:', json.dumps(d, indent=2))
            print('Deploy successful!')
            " 2>/dev/null; then
                break
              fi
              echo "Attempt $i: API not ready yet, retrying..."
              if [ "$i" -eq 12 ]; then
                echo "ERROR: API did not become healthy after 60s"
                docker logs deploy-api-1 --tail 20
                exit 1
              fi
            done

            echo "=== Cleaning up old images ==="
            docker image prune -f --filter "until=24h" || true
