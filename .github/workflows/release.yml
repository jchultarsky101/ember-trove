name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

# Only one deploy can run at a time on the Lightsail VM.
# A newer release tag cancels any in-progress deploy from an older tag.
concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  # Opt into Node.js 24 now; GitHub will force it on all runners from June 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # Extract the block between this version's heading and the next one
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          # Write to a temp file to avoid quoting issues
          echo "$NOTES" > /tmp/release-notes.txt
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "v${{ steps.notes.outputs.version }}" \
            --notes-file /tmp/release-notes.txt

  deploy:
    name: Deploy to production (Lightsail)
    runs-on: ubuntu-latest
    needs: release
    # `vars` context is valid in job-level `if`; `secrets` context is not.
    # Set the DEPLOY_ENABLED repository variable to "true" to activate auto-deploy.
    # Also add LIGHTSAIL_SSH_KEY and LIGHTSAIL_HOST to repository secrets.
    if: vars.DEPLOY_ENABLED == 'true'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ubuntu
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          # Rust rebuild on cold Lightsail VM can exceed 30 min; 60 min is safe.
          command_timeout: 60m
          script: |
            set -euo pipefail

            cd ~/ember-trove

            echo "=== Fetching latest main ==="
            git fetch origin main
            git checkout main
            git pull origin main

            echo "=== Rebuilding api and ui images ==="
            docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod build api ui

            echo "=== Restarting services ==="
            docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d --force-recreate api ui proxy

            echo "=== Verifying health ==="
            sleep 10
            docker exec deploy-api-1 wget -qO- http://localhost:3003/api/health | python3 -c "
            import sys, json
            d = json.load(sys.stdin)
            print('Health:', json.dumps(d, indent=2))
            assert d['status'] == 'ok', f'Health check failed: {d}'
            print('Deploy successful!')
            "
