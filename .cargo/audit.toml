[advisories]
# RUSTSEC-2023-0071: Marvin Attack timing sidechannel in rsa crate.
# This vulnerability affects RSA private-key operations. It is pulled in
# transitively via sqlx-mysql, which is included in sqlx's default feature
# set. Ember Trove uses PostgreSQL exclusively — no MySQL connection is ever
# opened, so the vulnerable code path is never executed.
# No fixed version of rsa is available upstream; ignore until sqlx drops the
# mysql feature from its defaults or a fix is released.
ignore = ["RUSTSEC-2023-0071"]
