[advisories]
# RUSTSEC-2023-0071: Marvin Attack timing sidechannel in rsa crate.
# Pulled via sqlx-mysql which is never used (Postgres-only project).
# No upstream fix available.
#
# RUSTSEC-2026-0049: CRL authorativeness matching bug in rustls-webpki.
# The 0.103.x branch was fixed in 0.103.10 (already updated in Cargo.lock).
# The 0.101.x branch has no fix and is a transitive dep from an older AWS SDK
